# ============================================
# SERVER CONFIGURATION
# ============================================
spring.application.name=auth-service
server.port=${PORT:8081}

# ============================================
# DATABASE CONFIGURATION
# ============================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/auth_elearning}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${PASSWORD_DB:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ============================================
# JWT CONFIGURATION
# ============================================
api.security.token.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.issuer=e-learning-platform
jwt.access.expiration=${JWT_ACCESS_EXPIRATION:900000}
jwt.refresh.expiration=${JWT_REFRESH_EXPIRATION:604800000}
jwt.refresh.remember.expiration=${JWT_REFRESH_REMEMBER_EXPIRATION:2592000000}

# ============================================
# EUREKA (SERVICE DISCOVERY)
# ============================================
eureka.client.service-url.defaultZone=${EUREKA_URI:http://localhost:8761/eureka}
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=${EUREKA_HOST:localhost}
eureka.instance.instance-id=${spring.application.name}:${spring.application.instance_id:${random.value}}

# ============================================
# ACTUATOR / MANAGEMENT
# ============================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.info.env.enabled=true
management.metrics.export.prometheus.enabled=true

# ============================================
# LOGGING
# ============================================
logging.level.dev.elearning.auth=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.cloud=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ============================================
# CORS CONFIGURATION
# ============================================
frontend.valuable=${FRONTEND_VALUABLE:http://localhost:5173,http://localhost:3000}

# ============================================
# SPRING CLOUD CONFIGURATION
# ============================================
spring.cloud.discovery.enabled=true
spring.cloud.client.hostname=${HOSTNAME:localhost}

# ============================================
# RESILIENCE (Circuit Breaker)
# ============================================
resilience4j.circuitbreaker.instances.auth-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.auth-service.minimum-number-of-calls=5

# ============================================
# THREAD POOL
# ============================================
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=100

# ============================================
# SPRING SECURITY (para evitar warning)
# ============================================
spring.security.user.name=${ACTUATOR_USER:admin}
spring.security.user.password=${ACTUATOR_PASSWORD:admin123}